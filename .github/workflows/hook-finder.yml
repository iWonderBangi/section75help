name: Hook Finder

# Runs daily at 07:00 UTC (07:00 GMT in winter / 08:00 BST in summer).
# Also triggerable manually via workflow_dispatch.
#
# What this does:
#   1. Fetches today's Gazette insolvency notices.
#   2. Looks up each company on Companies House for sector/SIC data.
#   3. Scores each company for Section 75 SEO opportunity.
#   4. Emails a morning report to REPORT_EMAIL_TO.
#   5. Uploads the full report as a workflow artifact (30-day retention).
#
# Required secrets:
#   COMPANIES_HOUSE_API_KEY — free at developer.company-information.service.gov.uk
#   RESEND_API_KEY          — free at resend.com
#   REPORT_EMAIL_TO         — your inbox address
#
# Optional secrets:
#   REPORT_EMAIL_FROM       — sender address (verified Resend domain).
#                             Omit to use the shared test sender (fine for personal use).
#
# This workflow does NOT publish pages or modify the public site.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    name: Run Hook Finder
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run Hook Finder (RSS mode)
        id: hook_finder
        run: npm run hook-finder:rss
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hook-finder-report-${{ github.run_id }}
          path: tools/hook-finder/output/
          retention-days: 30
